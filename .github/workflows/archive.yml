name: Archive CBR wachttijden

on:
  schedule:
    - cron: "17 15 * * 1"   # Monday 15:17 UTC — CBR updates Monday morning
    - cron: "17 6 * * 2"    # Tuesday 06:17 UTC — backstop (idempotent rerun)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and parse this week's publications
        run: python archive.py

      - name: Commit archive
        run: |
          git config user.name "cbr-archief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes this run."
          else
            git commit -m "archive: $(date -u +%G-W%V)"
            git pull --rebase origin main
            git push
          fi
